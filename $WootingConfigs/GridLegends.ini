; Grid Legends
; === Wooting Analog Binds ===
LX_A := {"a": -1.0, "d": 1.0}, LY_A := {"w": 1.0, "s": -1.0}
RX_A := {"j": -1.0, "l": 1.0}, RY_A := {"i": 1.0, "k": -1.0}
LT_A := {"LShift": 1.0,"LCtrl": 1.0}, RT_A := {"Space": 1.0}
; === Digital Key to Analog Binds ===
LX_D := [ ["q", -67*2.55], ["e", 67*2.55] ]
LY_D := [], RX_D := [], RY_D := [], LT_D := []
RT_D := []

; === Settings ===
exeName := ["GridLegends.exe", "test.exe"]
EnableMouseSteering := true
MouseSteerWidth := 1.0
LX_D_MovesMouse := false
WootingSupersedesMouse := false
WootingDeadzone := 8
LX_Antideadzone := 20
LY_Antideadzone := 0
RX_Antideadzone := 15
RY_Antideadzone := 0
LT_Antideadzone := 50
RT_Antideadzone := 50
EnableCursorReplacement := true
EnableMouseLock := true
EnableVerticalLine  := true

; USE PLAIN COMMENTS BELOW, ESCAPING WITH BACKTICK CAUSES CRAHES
; QUOTATION MARKS MUST BE DOUBLED
ProfileSpecificBinds := "
(
#If WinActive(""ahk_group ActiveGameGroup"")
*Space::Enter
~*lbutton::F10 ; additional left click input for binds
~*w::F10 ; handbrake to left click and w
*mbutton::, ; allows binding middle click
*WheelUp::
    Send, {Up down}
    Sleep, 25
    Send, {Up up}
    Sleep, 25
    return
*WheelDown::
    Send, {Down down}
    Sleep, 25
    Send, {Down up}
    Sleep, 25
    return
*g::SendRButton(1)
*g up::SendRButton(0)
*z::
    Send, {Enter down}
	Sleep, 20
	Send, {Enter up}
    Sleep, 20
    Return
*x::
	pad.Buttons.B.SetState(1)
	Sleep, 20
	pad.Buttons.B.SetState(0)
    Sleep, 20
    Return
*1::F1
*2::F2
*5:: ; restart race
	Sleep, 10
	BlockInput, MouseMove
	Sleep, 1
    Send, {Esc down}
    Sleep, 20
    Send, {Esc up}
    Sleep, 20
    Send, {Down down}
    Sleep, 20
	Send, {Down up}
    Sleep, 20
    Send, {Enter down}
    Sleep, 20
	Send, {Enter up}
    Sleep, 250
    Send, {Up down}
    Sleep, 20
	Send, {Up up}
    Sleep, 20
    Send, {Enter down}
    Sleep, 20
	Send, {Enter up}
    Sleep, 1
    BlockInput, MouseMoveOff
    Sleep, 1
    Return
#If
)"