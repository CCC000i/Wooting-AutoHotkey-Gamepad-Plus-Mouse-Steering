[AnalogBinds]
; for wooting - axis = key:multiplier, key:multiplier, etc.
LX_A=a:-1.0, d:1.0
LY_A=w:1.0, s:-1.0
RX_A=j:-1.0, l:1.0
RY_A=i:1.0, k:-1.0, s:-1.0
LT_A=LShift:1.0
RT_A=Space:1.0

[DigitalBinds]
; directly sets axis when held, range -255 to 255
LX_D=q:-170.85, e:170.85
LY_D=
RX_D=
RY_D=
LT_D=
RT_D=

[Settings]
; can be comma separated list, keep empty to run without window focus detection
exeName=GridLegends.exe, notepad.exe
; locks mouse inside window
EnableMouseLock=1
; for mouse steering
MouseSteeringAxisX=LX
MouseSteeringAxisY=
EnableCursorReplacement=1
EnableVerticalLine=1
; mouse steer box, 1.0 means square
MouseSteerWidth=1.0
; lock mouse to digital input position
LX_D_MovesMouse=0
; 0 = Analog keys add to mouse steer, 1 = override
AnalogSupersedesMouse=0
; wooting and xinput analog start, 0-255
WootingDeadzone=8
ExtStickDeadzone=8
ExtTriggerDeadzone=8
; anti-deadzones, 0-100
LX_Antideadzone=20
LY_Antideadzone=0
RX_Antideadzone=15
RY_Antideadzone=0
LT_Antideadzone=67
RT_Antideadzone=67
RT_Linearity=0.33
LT_Linearity=0.33



; === !!! Not ini format, must be placed at bottom ===
[CustomAutoexecute]

[CustomSubroutine]
#If WinActive("ahk_group ActiveGameGroup")
; Put Keyboard binds here (mouse binds are further below)
*g::
    Click, Right Down
    KeyWait, g
    Click, Right Up
	Return
*g up::Click, Right Up
*Space::Enter 
*z::
    Send, {Enter down}
    Sleep, 20
    Send, {Enter up}
    Sleep, 20
    Return
*x:: ; Turbo Controller B, lets you skip menus and jack off the handbrake
    pad.Buttons.B.SetState(1)
    Sleep, 20
    pad.Buttons.B.SetState(0)
    Sleep, 20
    Return
*1::F1
*2::F2
*3::WheelUp
*4::WheelDown
*5:: ; restart race
    Sleep, 10
    BlockInput, MouseMove
    Sleep, 1
    Send, {Esc down}
    Sleep, 20
    Send, {Esc up}
    Sleep, 20
    Send, {Down down}
    Sleep, 20
    Send, {Down up}
    Sleep, 20
    Send, {Enter down}
    Sleep, 20
    Send, {Enter up}
    Sleep, 250
    Send, {Up down}
    Sleep, 20
    Send, {Up up}
    Sleep, 20
    Send, {Enter down}
    Sleep, 20
    Send, {Enter up}
    Sleep, 1
    BlockInput, MouseMoveOff
    Sleep, 1
    Return
~LButton::f7
~w::f7
; AHI mouse binds: ahiOnLButton/RButton/MButton/XButton1/XButton2/Wheel - if one of these is missing, the corresponding key will not be intercepted and can be rebound normally but will not receive raw input protection
ahiS_RButton(start){
    if start {
        ActivateMouseSteering()
	}
    else {
        DeactivateMouseSteering()
	}
}
ahiS_MButton(start){
    if start {
        Send, {, down}
	}
    else {
        Send, {, up}
	}
}
ahiS_Wheel(direction) {
	if (direction == 1) {
		; Wheel Up
		Send, {Up down}
		Send, {Up up}
	} else if (direction == -1) {
		; Wheel Down
		Send, {Down down}
		Send, {Down up}
}} 

#If
; fallback if AutoHotInterception is disabled (Grid Legends in particular has too aggressive input reading though, so Right Click will always move the camera without AHI)
#If (WinActive("ahk_group ActiveGameGroup") && global EnableAHI == false)
*RButton::ActivateMouseSteering()
*RButton up::DeactivateMouseSteering()
#If
#If ; Ensures this is completely global
